<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Digital Virtuoso Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #d4a84b;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #d4a84b, #b8923a);
            color: #0a1628;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212,168,75,0.4); }
        .countdown { margin-top: 1.5rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Oops! The page you're looking for doesn't exist. Let's get you back on track.</p>
        <a href="/" class="btn">Back to Home</a>
        <p class="countdown">Redirecting you in <span id="timer">5</span> seconds...</p>
    </div>
    <script>
        let seconds = 5;
        const timer = document.getElementById('timer');
        const countdown = setInterval(() => {
            seconds--;
            timer.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
